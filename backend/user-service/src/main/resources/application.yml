server:
  port: 8081

spring:
  application:
    name: user-service
  datasource:
    url: jdbc:mysql://localhost:3307/paper_mind?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
        namespace: public

jwt:
  secret: paperMindSecretKey2024VeryLongSecretKeyForHS256AlgorithmThatIsAtLeast256Bits
  expiration: 86400000
