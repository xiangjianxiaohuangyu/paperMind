server:
  port: 8082

spring:
  application:
    name: paper-service
  datasource:
    url: jdbc:mysql://localhost:3307/paper_mind?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
        namespace: public

file:
  upload:
    dir: uploads

ai:
  engine:
    url: http://localhost:8083
